<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>QWERTY PANEL • NEO ADMIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #05050A;
      color: #ffffff;
      transition: background 0.2s ease;
      min-height: 100vh;
    }

    /* Light mode */
    body.light {
      background: #f1f5f9;
      color: #0f172a;
    }

    /* GLOBAL GLASS */
    .glass {
      background: rgba(15, 25, 35, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 28px;
    }

    body.light .glass {
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(0, 200, 255, 0.3);
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    /* LOGIN */
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(8, 12, 20, 0.9);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(0, 255, 255, 0.4);
      box-shadow: 0 25px 45px rgba(0,0,0,0.5);
      transition: 0.2s;
    }

    body.light .login-card {
      background: rgba(255, 255, 255, 0.9);
      border-color: #0ea5e9;
    }

    .logo-icon {
      font-size: 48px;
      text-align: center;
      background: linear-gradient(135deg, #0ff, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .input-field {
      margin-bottom: 20px;
    }

    .input-field label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
      display: block;
      margin-bottom: 8px;
    }

    .input-field input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 34px;
      color: white;
      font-size: 16px;
      outline: none;
      transition: 0.2s;
    }

    body.light .input-field input {
      background: white;
      color: #0f172a;
      border-color: #94a3b8;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #0ff, #a855f7);
      border: none;
      border-radius: 40px;
      font-weight: bold;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    /* DASHBOARD */
    .dashboard {
      display: none;
      padding-bottom: 30px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(5,5,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,255,255,0.2);
    }

    body.light .topbar {
      background: rgba(255,255,255,0.85);
    }

    .menu-toggle {
      font-size: 24px;
      cursor: pointer;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(20px);
      z-index: 100;
      transition: 0.3s ease;
      padding: 24px 16px;
      border-right: 1px solid #0ff;
    }

    .sidebar.open {
      left: 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      margin: 8px 0;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      color: #ccc;
    }

    .nav-item.active, .nav-item:hover {
      background: rgba(0,255,255,0.15);
      color: #0ff;
    }

    .main-content {
      padding: 20px 16px 100px;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(15,25,35,0.7);
      border-radius: 28px;
      padding: 18px;
      text-align: center;
      border: 1px solid rgba(0,255,255,0.2);
    }

    .stat-number {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg,#0ff,#c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .card {
      background: rgba(10,15,25,0.6);
      border-radius: 32px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid rgba(0,255,255,0.15);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      text-align: left;
      padding: 10px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .badge {
      background: rgba(0,255,136,0.2);
      color: #0f0;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 11px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f0f1a;
      border: 1px solid #0ff;
      padding: 10px 24px;
      border-radius: 60px;
      z-index: 999;
    }

    @media (max-width: 500px) {
      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }
      .card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-wrapper">
  <div class="login-card">
    <div class="logo-icon"><i class="fas fa-keyboard"></i></div>
    <h1>QWERTY</h1>
    <p style="text-align:center; margin-bottom: 28px; opacity:0.7;">SECURE NEO ADMIN</p>
    <div class="input-field">
      <label><i class="fas fa-user"></i> USERNAME</label>
      <input type="text" id="loginUsername" placeholder="owner" autocomplete="off">
    </div>
    <div class="input-field">
      <label><i class="fas fa-lock"></i> PASSWORD</label>
      <input type="password" id="loginPassword" placeholder="••••••">
    </div>
    <button class="btn" onclick="performLogin()"><i class="fas fa-shield-halbed"></i> AUTHENTICATE</button>
    <div id="loginError" style="color:#ff5566; margin-top: 20px; text-align:center; font-size:13px;"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
  <div class="topbar">
    <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
    <div><i class="fas fa-terminal"></i> QWERTY</div>
    <div><i class="fas fa-moon" onclick="toggleTheme()" style="cursor:pointer"></i></div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="nav-item active" onclick="navigateTo('overview')"><i class="fas fa-chart-line"></i> Overview</div>
    <div class="nav-item" onclick="navigateTo('keygen')"><i class="fas fa-key"></i> Key Generator</div>
    <div class="nav-item" onclick="navigateTo('keys')"><i class="fas fa-database"></i> Key Manager</div>
    <div class="nav-item" onclick="navigateTo('users')"><i class="fas fa-users"></i> User Monitor</div>
    <div class="nav-item" id="adminNavItem" style="display:none" onclick="navigateTo('admins')"><i class="fas fa-user-shield"></i> Admin Manager</div>
    <div class="nav-item" onclick="navigateTo('audit')"><i class="fas fa-history"></i> Audit Logs</div>
    <div style="margin-top: 40px;"><hr><button onclick="logout()" style="background:none; border:1px solid #ff5566; border-radius: 30px; padding: 8px; width:100%"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
  </div>

  <div class="main-content" id="mainContent"></div>
</div>

<script>
  const API_BASE = ''; // relative to origin
  let token = localStorage.getItem('token');
  let currentUser = null;

  // ========== UI RENDER ==========
  const sections = {
    overview: `
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card"><h3>📋 Recent Keys</h3><div id="recentKeysTable"></div></div>
    `,
    keygen: `
      <div class="card">
        <h3>✨ Generate Key</h3>
        <div class="input-field"><label>Prefix</label><input type="text" id="kgPrefix" placeholder="VIP"></div>
        <div class="input-field"><label>Duration (days)</label><select id="kgDuration"><option value="30">30 Days</option><option value="90">90 Days</option><option value="365">1 Year</option><option value="lifetime">Lifetime</option></select></div>
        <div class="input-field"><label>Device Limit</label><input type="number" id="kgDeviceLimit" value="1"></div>
        <button class="btn" onclick="generateNewKey()">GENERATE</button>
        <div id="keyResult" style="margin-top:16px; font-family: monospace;"></div>
      </div>
    `,
    keys: `<div class="card"><h3>🔑 All Keys</h3><div id="keysList"></div></div>`,
    users: `<div class="card"><h3>👥 User Sessions</h3><div id="usersList"></div></div>`,
    admins: `<div class="card"><h3>👑 Admin Manager</h3><div id="adminsList"></div><hr><div class="input-field"><label>New Admin</label><input id="newAdminUser" placeholder="username"></div><div class="input-field"><label>Password</label><input id="newAdminPass" type="password"></div><button class="btn" onclick="createNewAdmin()">Create Admin</button></div>`,
    audit: `<div class="card"><h3>📜 Audit Trail</h3><div id="auditList"></div></div>`
  };

  async function renderSection(name) {
    document.getElementById('mainContent').innerHTML = sections[name] || sections.overview;
    if (name === 'overview') { loadStats(); loadRecentKeys(); }
    if (name === 'keys') loadAllKeys();
    if (name === 'users') loadAllUsers();
    if (name === 'admins') loadAllAdmins();
    if (name === 'audit') loadAuditLogs();
  }

  async function loadStats() {
    const res = await fetch(`${API_BASE}/api/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-number">${data.totalKeys||0}</div><div>Total Keys</div></div>
      <div class="stat-card"><div class="stat-number">${data.activeKeys||0}</div><div>Active</div></div>
      <div class="stat-card"><div class="stat-number">${data.totalUsers||0}</div><div>Users</div></div>
      <div class="stat-card"><div class="stat-number">${data.onlineUsers||0}</div><div>Online</div></div>
    `;
  }

  async function loadRecentKeys() {
    const res = await fetch(`${API_BASE}/api/keys`, { headers: { 'Authorization': `Bearer ${token}` } });
    const keys = await res.json();
    const html = `<table>${keys.slice(0,5).map(k => `<tr><td><code>${k.key_value}</code></td><td><span class="badge">${k.status}</span></td><td>${new Date(k.expires_at).toLocaleDateString()}</td></tr>`).join('')}</table>`;
    document.getElementById('recentKeysTable').innerHTML = html || '<p>No keys</p>';
  }

  async function generateNewKey() {
    const body = {
      prefix: document.getElementById('kgPrefix')?.value,
      duration: document.getElementById('kgDuration')?.value,
      deviceLimit: parseInt(document.getElementById('kgDeviceLimit')?.value),
      keyType: 'standard'
    };
    const res = await fetch(`${API_BASE}/api/keys/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('keyResult').innerHTML = `<div style="background:#0ff1; padding:12px; border-radius:24px">✅ Key: <strong>${data.key.key_value}</strong><br>Expires: ${new Date(data.key.expires_at).toLocaleString()}</div>`;
      loadRecentKeys(); loadStats();
    } else alert('Gagal generate key');
  }

  async function loadAllKeys() {
    const res = await fetch(`${API_BASE}/api/keys`, { headers: { 'Authorization': `Bearer ${token}` } });
    const keys = await res.json();
    document.getElementById('keysList').innerHTML = `<table>${keys.map(k => `<tr><td><code>${k.key_value}</code></td><td>${k.status}</td><td><button onclick="banKey(${k.id})">Ban</button></td></tr>`).join('')}</table>`;
  }
  async function loadAllUsers() {
    const res = await fetch(`${API_BASE}/api/users`, { headers: { 'Authorization': `Bearer ${token}` } });
    const users = await res.json();
    document.getElementById('usersList').innerHTML = `<table>${users.map(u => `<tr><td>${u.username||'?'}</td><td>${u.hwid?.slice(0,10)}</td><td>${u.ip_address}</td></tr>`).join('')}</table>`;
  }
  async function loadAllAdmins() {
    const res = await fetch(`${API_BASE}/api/admins`, { headers: { 'Authorization': `Bearer ${token}` } });
    const admins = await res.json();
    document.getElementById('adminsList').innerHTML = `<table>${admins.map(a => `<tr><td>${a.username}</td><td>${a.role}</td><td><button onclick="deleteAdmin(${a.id})">❌</button></td></tr>`).join('')}</table>`;
  }
  async function createNewAdmin() {
    const username = document.getElementById('newAdminUser').value;
    const password = document.getElementById('newAdminPass').value;
    await fetch(`${API_BASE}/api/admins`, { method:'POST', headers:{'Content-Type':'application/json', 'Authorization':`Bearer ${token}`}, body:JSON.stringify({username,password,role:'admin'}) });
    loadAllAdmins();
  }
  async function loadAuditLogs() {
    const res = await fetch(`${API_BASE}/api/audit`, { headers: { 'Authorization': `Bearer ${token}` } });
    const logs = await res.json();
    document.getElementById('auditList').innerHTML = `<table>${logs.slice(0,20).map(l => `<tr><td>${l.action}</td><td>${l.target||'-'}</td><td>${new Date(l.created_at).toLocaleString()}</td></tr>`).join('')}</table>`;
  }

  window.banKey = async (id) => { await fetch(`${API_BASE}/api/keys/${id}/status`, { method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body:JSON.stringify({status:'banned'}) }); loadAllKeys(); };
  window.deleteAdmin = async (id) => { await fetch(`${API_BASE}/api/admins/${id}`, { method:'DELETE', headers:{'Authorization':`Bearer ${token}`} }); loadAllAdmins(); };

  // ========== LOGIN ==========
  async function performLogin() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    try {
      const res = await fetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Login failed');
      token = json.token;
      currentUser = json.user;
      localStorage.setItem('token', token);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      if (currentUser.role === 'owner') document.getElementById('adminNavItem').style.display = 'flex';
      navigateTo('overview');
    } catch (err) {
      document.getElementById('loginError').innerText = err.message;
    }
  }

  function navigateTo(section) {
    renderSection(section);
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    event?.target?.closest('.nav-item')?.classList?.add('active');
    if (window.innerWidth < 700) toggleSidebar(true);
  }

  function toggleSidebar(forceClose) {
    const sidebar = document.getElementById('sidebar');
    if (forceClose) sidebar.classList.remove('open');
    else sidebar.classList.toggle('open');
  }

  function logout() {
    localStorage.removeItem('token');
    location.reload();
  }

  function toggleTheme() {
    document.body.classList.toggle('light');
  }

  // auto session
  if (token) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    currentUser = { role: 'owner' }; // fallback
    navigateTo('overview');
    loadStats();
  }

  // Toast
  function showToast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
  }
  window.showToast = showToast;
</script>
</body>
</html>
